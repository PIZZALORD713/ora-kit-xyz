<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OraKit 404</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08090c;
        --panel: #1c2028;
        --line: #343b49;
        --gold: #f2c14e;
        --text: #f4f1e8;
        --muted: #aeb6c4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 24% 18%, rgba(242, 193, 78, 0.18), transparent 32%),
          radial-gradient(circle at 78% 16%, rgba(91, 192, 235, 0.16), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(920px, 100%);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
      }
      img { display: block; width: 100%; background: #111318; }
      section { padding: 24px; }
      .eyebrow {
        color: var(--gold);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 10px;
        color: var(--gold);
        font-size: clamp(38px, 7vw, 76px);
        line-height: 0.95;
      }
      p {
        margin: 0 0 18px;
        max-width: 680px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
        font-weight: 650;
      }
      a {
        display: inline-flex;
        border-radius: 12px;
        background: var(--gold);
        color: #08090c;
        padding: 12px 16px;
        text-decoration: none;
        font-weight: 950;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/ora-4147-alpha-cola-fail.gif" alt="Ora 4147 failing a kickflip over Alpha Cola">
      <section>
        <div class="eyebrow">404 / Alpha Cola spill</div>
        <h1>Kickflip failed.</h1>
        <p>Ora 4147 could not land this route. Search another wallet or ENS from the OraKit home page.</p>
        <a href="/">Back to OraKit</a>
      </section>
    </main>
  </body>
</html>
